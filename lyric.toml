[package]
name        = "CloudAgents"
version     = "0.1.0"
authors     = ["Cloud Agents Developer"]
license     = "MIT"
description = "Cloud Agents backend API server written in Lyric targeting .NET 10"

[features]
default = ["dotnet", "sqlite"]
dotnet  = []
sqlite  = []

[project]
name            = "CloudAgents"
output          = "single"
output_assembly = "CloudAgents.dll"

[project.packages]
"CloudAgents"          = "src/main.l"
"CloudAgents.Text"     = "src/text.l"
"CloudAgents.SessionStore" = "src/sessions/session_manager.l"
"CloudAgents.Handlers" = "src/handlers/sessions.l"
"CloudAgents.Interactions" = "src/handlers/interactions.l"
"CloudAgents.Callbacks" = "src/handlers/callbacks.l"
"CloudAgents.NetworkPolicy" = "src/network_policy.l"
"CloudAgents.RunnerEnv" = "src/runner_env.l"
"CloudAgents.DockerPolicy" = "src/docker_policy.l"
"CloudAgents.RepoKey"  = "src/repo_key.l"
"CloudAgents.Docker"   = "src/docker_manager.l"
"CloudAgents.Db"       = "src/db/db_client.l"
"CloudAgents.Sqlite"   = "src/db/sqlite_driver.l"
"CloudAgents.Repository" = "src/db/repository.l"
"CloudAgents.Auth"     = "src/handlers/auth.l"
"CloudAgents.GitHubApi" = "src/github_api.l"
"CloudAgents.OAuth"    = "src/handlers/oauth.l"
"CloudAgents.Prompts"  = "src/handlers/prompts.l"
"CloudAgents.Crypto"   = "src/crypto/crypto.l"
"CloudAgents.Credentials" = "src/handlers/credentials.l"
"CloudAgents.Profiles" = "src/handlers/profiles.l"
"CloudAgents.Library"  = "src/handlers/library.l"
"CloudAgents.Webhooks" = "src/handlers/webhooks.l"
"CloudAgents.Streaming" = "src/streaming/streaming.l"
"CloudAgents.Proxy"    = "src/handlers/proxy.l"

[project.tests]
"CloudAgents.SessionTests"   = "tests/session_tests.l"
"CloudAgents.StreamingTests" = "tests/streaming_tests.l"
"CloudAgents.DbTests"        = "tests/db_tests.l"
"CloudAgents.AuthTests"      = "tests/auth_tests.l"
"CloudAgents.DockerClientTests" = "tests/docker_client_tests.l"
"CloudAgents.MainTests"      = "tests/main_tests.l"
"CloudAgents.PromptTests"    = "tests/prompt_tests.l"
"CloudAgents.CryptoTests"    = "tests/crypto_tests.l"
"CloudAgents.CredentialTests" = "tests/credential_tests.l"
"CloudAgents.ProfileTests"   = "tests/profile_tests.l"
"CloudAgents.LibraryTests"   = "tests/library_tests.l"
"CloudAgents.WebhookTests"   = "tests/webhook_tests.l"
"CloudAgents.OAuthTests"     = "tests/oauth_tests.l"
"CloudAgents.NetworkPolicyTests" = "tests/network_policy_tests.l"
"CloudAgents.RunnerEnvTests" = "tests/runner_env_tests.l"
"CloudAgents.DockerPolicyTests" = "tests/docker_policy_tests.l"
"CloudAgents.RepoKeyTests"   = "tests/repo_key_tests.l"
"CloudAgents.TextTests"      = "tests/text_tests.l"
"CloudAgents.InteractionsTests" = "tests/interactions_tests.l"
"CloudAgents.ProxyTests"     = "tests/proxy_tests.l"
"CloudAgents.RepositoryTests" = "tests/repository_tests.l"
"CloudAgents.CallbacksTests" = "tests/callbacks_tests.l"
"CloudAgents.GitHubApiTests" = "tests/github_api_tests.l"
"CloudAgents.CallbacksV2Tests" = "tests/callbacks_v2_tests.l"

[nuget]
"Lyric.Web"             = "0.4.34"
"Lyric.Docker"          = "0.4.34"
"Std.Logging"           = "0.4.20"
"Microsoft.Data.Sqlite" = "10.0.9"
"SourceGear.sqlite3"    = "3.53.3"
"SQLitePCLRaw.provider.dynamic_cdecl" = "3.0.3"


