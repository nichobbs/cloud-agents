name: Auto-merge

# Merges a PR automatically once all of its required conditions are green:
#   - "Build & verify" (ci.yml's build/test job)
#   - "claude-review" (claude-code-review.yml's job — already engineered to
#     fail itself when the review:changes-required label is set; see that
#     workflow's "Fail if changes are required" step)
#   - at least one human APPROVED review (nichobbs/cloud-agents#478 — the
#     two checks above are both automated, so without this a PR could reach
#     `main` with zero human eyes on the diff; see "Require human approval"
#     below)
#
# Deliberately does NOT rely on GitHub's native "required status checks" +
# auto-merge feature: that needs branch-protection config and the repo's
# "Allow auto-merge" toggle, neither of which this workflow assumes are set.
# Instead it checks both named check runs (and, per #478, human review
# state) itself via the API and merges directly once everything's green —
# self-contained, no repo-settings dependency. If branch protection does end
# up requiring something else this workflow doesn't know about, the merge
# call below simply fails and this workflow logs a warning; it does not
# attempt to bypass that.
#
# check_suite is the ONLY trigger — deliberately no `pull_request` trigger.
# A same-repo pull_request-triggered workflow runs the workflow FILE VERSION
# FROM THE PR'S OWN BRANCH, with full write permissions and secrets access
# (unlike fork PRs, which get a read-only token) — so a `pull_request`
# trigger here would let any same-repo PR rewrite this file's own gating
# logic to merge itself, defeating the whole point (caught in PR #474
# review). check_suite-triggered workflows always run the trusted
# default-branch copy instead, regardless of what the PR branch contains.
# No coverage is lost: check_suite events bundle every GitHub Actions
# workflow run for a given commit into one suite, so "completed" fires
# once everything (ci.yml, claude-code-review.yml, etc.) has finished for
# that SHA — including for a PR's very first push, which triggers those
# workflows via their own `pull_request` triggers regardless.
# `check_suite.pull_requests` is only populated for same-repo branches, so
# fork PRs are (intentionally) never auto-merged by this workflow.
on:
  check_suite:
    types: [completed]

concurrency:
  group: auto-merge-${{ github.event.check_suite.head_sha }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # nichobbs/cloud-agents#479: check_suite fires for every completed suite,
    # including failed/cancelled ones. When the triggering suite itself
    # didn't succeed, the per-check-name lookups below can never all read
    # "success" for this sha (at least one of the runs composing the suite
    # didn't succeed), so the job is guaranteed to end in "not yet green —
    # no action" for every candidate PR regardless. Skip the job outright in
    # that case instead of still paying for a full run (checkout-free, but
    # still a `gh pr view` + paginated `gh api .../check-runs` per candidate)
    # for a guaranteed no-op.
    if: github.event.check_suite.conclusion == 'success'
    steps:
      - name: Find candidate PR(s) for this event
        id: find_prs
        uses: actions/github-script@v7
        with:
          script: |
            const prNumbers = (context.payload.check_suite.pull_requests || []).map(pr => pr.number);
            core.setOutput('prs', JSON.stringify(prNumbers));

      - name: Evaluate and merge each candidate PR
        if: steps.find_prs.outputs.prs != '[]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PRS_JSON: ${{ steps.find_prs.outputs.prs }}
        run: |
          set -uo pipefail
          for pr in $(echo "$PRS_JSON" | jq -r '.[]'); do
            echo "== PR #$pr =="

            info=$(gh pr view "$pr" --repo "$REPO" --json state,isDraft,headRefOid \
              --jq '"\(.state)|\(.isDraft)|\(.headRefOid)"')
            if [ $? -ne 0 ] || [ -z "$info" ]; then
              echo "::warning::failed to fetch PR #$pr info, skipping"
              continue
            fi
            IFS='|' read -r state draft sha <<< "$info"

            if [ "$state" != "OPEN" ] || [ "$draft" == "true" ]; then
              echo "skip: not an open, ready-for-review PR (state=$state draft=$draft)"
              continue
            fi

            checks=$(gh api "repos/$REPO/commits/$sha/check-runs" --paginate --jq '.check_runs')
            if [ $? -ne 0 ]; then
              echo "::warning::failed to fetch check runs for PR #$pr (sha $sha), skipping"
              continue
            fi
            ci_conclusion=$(echo "$checks" | jq -sr 'add | [.[] | select(.name == "Build & verify")] | sort_by(.started_at) | last | .conclusion // "pending"')
            review_conclusion=$(echo "$checks" | jq -sr 'add | [.[] | select(.name == "claude-review")] | sort_by(.started_at) | last | .conclusion // "pending"')

            # Require human approval (nichobbs/cloud-agents#478): "Build &
            # verify" and "claude-review" above are both automated, so
            # without this a PR could merge to main with zero human eyes on
            # the diff. Below, take each reviewers most recent review (a
            # stale APPROVED must not count if that reviewer later
            # requested changes) and require at least one such latest
            # review, from a non-bot account, to be APPROVED. NOTE: this jq
            # filter must stay apostrophe-free — it is embedded in a bash
            # single-quoted string, and bash single quotes cannot be escaped,
            # so any apostrophe here would silently truncate the script.
            # COMMENTED (and unsubmitted PENDING draft) reviews do not
            # change a reviewers approval stance on GitHub, unlike
            # APPROVED/CHANGES_REQUESTED/DISMISSED, so they are excluded
            # before picking each reviewers latest review by submit time.
            reviews=$(gh api "repos/$REPO/pulls/$pr/reviews" --paginate --jq '.')
            if [ $? -ne 0 ]; then
              echo "::warning::failed to fetch reviews for PR #$pr, skipping"
              continue
            fi
            human_approvals=$(echo "$reviews" | jq -sr '
              add
              | map(select(.user.type != "Bot"))
              | map(select(.state == "APPROVED" or .state == "CHANGES_REQUESTED" or .state == "DISMISSED"))
              | group_by(.user.login)
              | map(max_by(.submitted_at))
              | map(select(.state == "APPROVED"))
              | length
            ')

            echo "Build & verify: $ci_conclusion | claude-review: $review_conclusion | human approvals: $human_approvals"

            if [ "$ci_conclusion" == "success" ] && [ "$review_conclusion" == "success" ] && [ "$human_approvals" -gt 0 ]; then
              echo "Required checks green and human-approved — merging #$pr at $sha"
              # Pass `sha` explicitly (REST API's merge endpoint: "SHA that
              # pull request head must match to allow merge") so this only
              # merges the exact commit whose checks were just verified —
              # if the PR moved between the check above and this call, the
              # request 409s instead of merging an unverified commit.
              if ! gh api --method PUT "repos/$REPO/pulls/$pr/merge" \
                    -f merge_method=merge -f sha="$sha" >/tmp/merge-out-$pr.json 2>&1; then
                echo "::warning::merge attempt for #$pr failed (head moved since the check above, already merged, or another required condition — e.g. a branch-protection rule this workflow doesn't know about — is unmet)"
                cat "/tmp/merge-out-$pr.json"
              fi
            else
              echo "not yet green — no action"
            fi
          done
