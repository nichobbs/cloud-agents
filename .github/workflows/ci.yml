name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Lyric compiler
        run: |
          curl -fsSL https://raw.githubusercontent.com/nichobbs/lyric-lang/main/scripts/install.sh \
            | sh -s -- --dir "$HOME/.local/bin" --no-path
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lyric version
        run: lyric --version

      # Shell + asset sanity checks (no Lyric toolchain needed).
      - name: Lint shell scripts
        run: |
          for f in \
            docker/entrypoint.sh \
            docker/entrypoint-codex.sh \
            docker/entrypoint-opencode.sh \
            deploy/install-docker.sh \
            deploy/backup.sh \
            scripts/verify.sh \
            scripts/build-full.sh \
            scripts/dev.sh \
            scripts/build-docker.sh \
            scripts/run-api.sh; do
            bash -n "$f" && echo "ok: $f"
          done

      - name: Validate JSON templates
        run: |
          for f in docker/mcp.json.template docker/settings.json.template; do
            python3 -m json.tool "$f" > /dev/null && echo "ok: $f"
          done

      # Runs the @test_module suites (SSE framing, Phase 2/3 state machine,
      # recycling, auth). All library deps (Lyric.Web, Lyric.Docker,
      # Std.Logging, Microsoft.Data.Sqlite) restore from NuGet — no sibling
      # lyric-lang checkout needed.
      - name: Run tests
        run: ./scripts/verify.sh

      # Build the entire server — API + Web + Docker — against the same
      # NuGet-restored dependencies.
      - name: Build full server
        run: ./scripts/build-full.sh
