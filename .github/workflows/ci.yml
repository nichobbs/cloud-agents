name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Resolve the latest release tag via the unauthenticated github.com
      # redirect (works even when api.github.com is rate-limited/blocked for
      # unauthenticated runners, see docs/BUILD.md) *before* installing, so
      # we can assert a version floor with a clear diagnostic if a future
      # release ever regresses one of the seven known bugs (see "Compiler
      # notes") — rather than the new hard-gating `lyric test` step below
      # failing opaquely on an unrelated application PR. Passing the
      # resolved version to --version also pins what actually gets
      # installed, instead of both this step and the installer separately
      # re-resolving "latest" (a small deterministic-CI bonus, not just a
      # gating one). This endpoint used to be hit only as an opportunistic
      # fallback; it's now a hard dependency of every run, so retry a few
      # times with brief backoff rather than failing the whole job on one
      # transient blip (review #142).
      - name: Resolve latest Lyric release
        id: resolve_lyric
        run: |
          ver=""
          for attempt in 1 2 3; do
            ver=$(curl -sI https://github.com/nichobbs/lyric-lang/releases/latest \
                    | sed -n 's/.*tag\/v\([0-9.]*\).*/\1/p' | tr -d '\r')
            [ -n "$ver" ] && break
            echo "attempt $attempt: could not resolve latest Lyric release tag, retrying..." >&2
            sleep 3
          done
          [ -n "$ver" ] || { echo "could not resolve latest Lyric release tag after 3 attempts" >&2; exit 1; }
          echo "Resolved latest Lyric release: v$ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      # Fails fast with a clear diagnostic if a future Lyric release ever
      # drops below the version this project's docs/BUILD.md documents as
      # having all seven known upstream compiler bugs fixed — see
      # nichobbs/cloud-agents#140 and docs/BUILD.md "Compiler notes", which
      # cross-references this floor so the two stay in sync (review #144).
      # Bump both together if a new bug is found and fixed later.
      - name: Verify minimum Lyric version
        run: |
          MIN_VERSION="0.4.19"
          RESOLVED="${{ steps.resolve_lyric.outputs.version }}"
          lowest="$(printf '%s\n%s\n' "$MIN_VERSION" "$RESOLVED" | sort -V | head -1)"
          if [ "$lowest" != "$MIN_VERSION" ]; then
            echo "::error::Latest Lyric release ($RESOLVED) is older than $MIN_VERSION, the version docs/BUILD.md 'Compiler notes' documents as having all seven known upstream bugs fixed. If this is a genuine downgrade/regression, investigate via ./scripts/repro-compiler-bug.sh and consider marking the 'Run lyric test' step continue-on-error again until it's resolved upstream." >&2
            exit 1
          fi
          echo "Lyric $RESOLVED >= required minimum $MIN_VERSION"

      # Download the exact resolved release directly rather than going
      # through install.sh's own (unverified) --version handling — this
      # step's entire job is to install precisely the version the previous
      # step just checked >= MIN_VERSION, and a positive, direct download
      # of that exact tag makes that guarantee airtight instead of trusting
      # install.sh to honor an untested flag (review #146; empirically
      # confirmed separately that install.sh --version does work as
      # documented, by installing v0.4.15 this way and behaviorally
      # verifying it still reproduces lyric-lang#5244, which v0.4.18+
      # fixes — but this project shouldn't have to depend on that holding
      # forever when a direct download is just as simple and removes the
      # question entirely).
      - name: Install Lyric compiler
        run: |
          mkdir -p "$HOME/.local/bin"
          ver="${{ steps.resolve_lyric.outputs.version }}"
          curl -fsSL -o /tmp/lyric.tgz \
            "https://github.com/nichobbs/lyric-lang/releases/download/v${ver}/lyric-${ver}-linux-x64.tar.gz"
          tar -xzf /tmp/lyric.tgz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # NOTE: `lyric --version` is known to always print "lyric 0.1.0"
      # regardless of the actual installed release (confirmed against both
      # v0.4.18 and v0.4.19) — a separate, minor CLI bug, unrelated to the
      # seven tracked here. Don't rely on this step's output for anything;
      # the "Resolve latest Lyric release" step above is the source of
      # truth for what actually got installed.
      - name: Lyric version
        run: lyric --version

      # Diagnostic, not a gate: reports which of the seven known upstream
      # compiler bugs (see docs/BUILD.md "Compiler notes") this runner's
      # Lyric version still has. continue-on-error so a still-open bug here
      # doesn't fail CI on its own — the Build/Run steps below are the real
      # gate for whether this project actually builds.
      - name: Check known compiler bug status
        continue-on-error: true
        run: ./scripts/repro-compiler-bug.sh

      # Shell + asset sanity checks (no Lyric toolchain needed).
      - name: Lint shell scripts
        run: |
          for f in \
            docker/entrypoint.sh \
            docker/entrypoint-codex.sh \
            docker/entrypoint-opencode.sh \
            deploy/install-docker.sh \
            deploy/backup.sh \
            scripts/verify.sh \
            scripts/build-full.sh \
            scripts/dev.sh \
            scripts/build-docker.sh \
            scripts/run-api.sh \
            scripts/repro-compiler-bug.sh; do
            bash -n "$f" && echo "ok: $f"
          done

      - name: Validate JSON templates
        run: |
          for f in docker/mcp.json.template docker/settings.json.template; do
            python3 -m json.tool "$f" > /dev/null && echo "ok: $f"
          done

      # Build the entire server. Lyric.Web/Std.Logging/Microsoft.Data.Sqlite
      # restore from NuGet; Lyric.Docker compiles from vendor/lyric-docker as
      # an ordinary local package (the published NuGet Lyric.Docker package
      # doesn't expose the container-lifecycle API this project needs — see
      # docs/BUILD.md). No sibling lyric-lang checkout either way.
      - name: Build full server
        run: ./scripts/build-full.sh

      # Runtime-verify the Docker/Web-independent logic (SSE framing, Phase
      # 2/3 state machine, recycling, auth) via a hand-rolled `main()`
      # harness rather than `lyric test` — kept as its own, dependency-free
      # check even now that `lyric test` (below) is fully green; see
      # docs/BUILD.md "Running tests"/"Compiler notes" for why this harness
      # existed in the first place.
      - name: Run tests
        run: ./scripts/verify.sh

      # The real @test_module suites. All seven known upstream compiler bugs
      # (see docs/BUILD.md "Compiler notes") are now fixed as of v0.4.19, so
      # this is expected to pass 24/24 — the first time in this project's
      # history that `lyric test` has been a viable CI gate.
      - name: Run lyric test
        run: lyric test
