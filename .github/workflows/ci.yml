name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Pin the frontend's Node version rather than relying on whatever
      # ubuntu-latest happens to preinstall (#223) — otherwise a runner-image
      # bump could silently change the Node the build/test steps run under.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache the frontend's npm downloads keyed on its lockfile so
          # `npm ci` doesn't re-fetch every dependency each run (#329).
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Resolve the release tag up front via the unauthenticated github.com
      # redirect (see docs/BUILD.md — api.github.com is sometimes
      # rate-limited for unauthenticated runners), so both the version-floor
      # check and the install step below use the same, single resolution
      # instead of each re-resolving "latest" independently. Retried with a
      # timeout per attempt since this is now a hard dependency of every
      # run, not just an opportunistic fallback.
      - name: Resolve latest Lyric release
        id: resolve_lyric
        run: |
          ver=""
          for attempt in 1 2 3; do
            ver=$(curl -sI --connect-timeout 10 --max-time 30 https://github.com/nichobbs/lyric-lang/releases/latest \
                    | sed -n 's/.*tag\/v\([0-9.]*\).*/\1/p' | tr -d '\r')
            [ -n "$ver" ] && break
            echo "attempt $attempt: could not resolve latest Lyric release tag, retrying..." >&2
            sleep 3
          done
          [ -n "$ver" ] || { echo "could not resolve latest Lyric release tag after 3 attempts" >&2; exit 1; }
          echo "Resolved latest Lyric release: v$ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      # Fails fast with a clear diagnostic if a release ever drops below
      # MIN_LYRIC_VERSION (see nichobbs/cloud-agents#140) — a single
      # checked-in file, also referenced from docs/BUILD.md, so the floor
      # can't drift out of sync between the two.
      - name: Verify minimum Lyric version
        env:
          RESOLVED: ${{ steps.resolve_lyric.outputs.version }}
        run: |
          MIN_VERSION="$(cat MIN_LYRIC_VERSION)"
          lowest="$(printf '%s\n%s\n' "$MIN_VERSION" "$RESOLVED" | sort -V | head -1)"
          if [ "$lowest" != "$MIN_VERSION" ]; then
            echo "::error::Latest Lyric release ($RESOLVED) is older than $MIN_VERSION (see MIN_LYRIC_VERSION), the version docs/BUILD.md 'Compiler notes' documents as having all seven known upstream bugs fixed. If this is a genuine downgrade/regression, investigate via ./scripts/repro-compiler-bug.sh and consider marking the 'Run lyric test' step continue-on-error again until it's resolved upstream." >&2
            exit 1
          fi
          echo "Lyric $RESOLVED >= required minimum $MIN_VERSION"

      # Download the exact resolved release directly rather than going
      # through install.sh's own --version handling, so installing exactly
      # what the previous step just verified >= MIN_LYRIC_VERSION doesn't
      # depend on trusting an unverified flag.
      - name: Install Lyric compiler
        env:
          ver: ${{ steps.resolve_lyric.outputs.version }}
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL --connect-timeout 10 --max-time 120 --retry 3 --retry-delay 3 -o /tmp/lyric.tgz \
            "https://github.com/nichobbs/lyric-lang/releases/download/v${ver}/lyric-${ver}-linux-x64.tar.gz"
          tar -xzf /tmp/lyric.tgz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # NOTE: `lyric --version` is known to always print "lyric 0.1.0"
      # regardless of the actual installed release (confirmed against both
      # v0.4.18 and v0.4.19) — a separate, minor CLI bug, unrelated to the
      # seven tracked here. Don't rely on this step's output for anything;
      # the "Resolve latest Lyric release" step above is the source of
      # truth for what actually got installed.
      - name: Lyric version
        run: lyric --version

      # Diagnostic, not a gate: reports which of the seven known upstream
      # compiler bugs (see docs/BUILD.md "Compiler notes") this runner's
      # Lyric version still has. continue-on-error so a still-open bug here
      # doesn't fail CI on its own — the Build/Run steps below are the real
      # gate for whether this project actually builds.
      - name: Check known compiler bug status
        continue-on-error: true
        run: ./scripts/repro-compiler-bug.sh

      # Diagnostic, not a gate: reports whether the Lyric.Web library bug
      # documented in docs/BUILD.md "Dependencies" (Encoding.GetBytes
      # extern-binding crash, lyric-lang#3887) still reproduces against the
      # currently-pinned Lyric.Web version. continue-on-error since this
      # project doesn't yet rely on the HTTP server actually working.
      - name: Check known Lyric.Web bug status
        continue-on-error: true
        run: ./scripts/repro-web-bug.sh

      # Diagnostic, not a gate: reports whether the second, distinct
      # Lyric.Web bug tracked as nichobbs/cloud-agents#354 (constructing a
      # Web.Request record crashes with InvalidProgramException) still
      # reproduces against the currently-pinned Lyric.Web version.
      # continue-on-error since production code never constructs a Request
      # itself (only receives one from the framework) — see the script's
      # header comment for the full distinction from repro-web-bug.sh.
      - name: Check known Web.Request construction bug status
        continue-on-error: true
        run: ./scripts/repro-web-request-crash.sh

      # Frontend: typecheck + production build (review #179). Node is pinned by
      # the "Set up Node" step above (#223), not taken from the runner image.
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build   # tsc && vite build — see frontend/package.json

      # Frontend unit tests (Vitest + Testing Library, jsdom): SessionDetail's
      # template modal and the profile-fetch race guard (#281). Reuses the
      # deps installed by the build step above.
      - name: Test frontend
        working-directory: frontend
        run: npm test   # vitest run — see frontend/package.json

      # Shell + asset sanity checks (no Lyric toolchain needed).
      - name: Lint shell scripts
        run: |
          for f in \
            docker/entrypoint.sh \
            docker/entrypoint-codex.sh \
            docker/entrypoint-opencode.sh \
            docker/entrypoint-gemini.sh \
            docker/reconcile-repos.sh \
            docker/cloud-agents-shim \
            deploy/install-docker.sh \
            deploy/backup.sh \
            scripts/verify.sh \
            scripts/build-full.sh \
            scripts/dev.sh \
            scripts/build-docker.sh \
            scripts/upload-credentials.sh \
            scripts/install.sh \
            scripts/run-api.sh \
            scripts/e2e-http.sh \
            scripts/test-reconcile-repos.sh \
            scripts/test-opencode-entrypoint.sh \
            scripts/test-lyric-version-resolution.sh \
            scripts/test-split-ca-bundle.sh \
            docker/split-ca-bundle.sh \
            scripts/check-compose-paths.sh \
            scripts/repro-compiler-bug.sh \
            scripts/repro-web-bug.sh \
            scripts/repro-web-request-crash.sh \
            scripts/repro-docker-crash.sh; do
            bash -n "$f" && echo "ok: $f"
          done

      - name: Validate JSON templates
        run: |
          for f in docker/mcp.json.template docker/settings.json.template docker/settings-callbacks.json.template docker/mcp-callbacks.json.template; do
            python3 -m json.tool "$f" > /dev/null && echo "ok: $f"
          done

      # Regression test for the shared multi-repo reconcile/prune script
      # (docker/reconcile-repos.sh, #471). Uses a mock `git` against a temp
      # workspace — no Docker, no network, no Lyric toolchain.
      - name: Test reconcile-repos.sh
        run: ./scripts/test-reconcile-repos.sh

      # Regression test for docker/entrypoint-opencode.sh's `opencode run`
      # invocation (#17): pins the invocation shape (subcommand, --model,
      # -- separator, positional prompt) verified against the real OpenCode
      # CLI docs — see the script for the full verification and the
      # documented --model provider/model discrepancy it deliberately does
      # not attempt to fix.
      - name: Test opencode entrypoint invocation
        run: ./scripts/test-opencode-entrypoint.sh

      # Regression test for the sed/tr/sort -V one-liners shared by the
      # "Resolve latest Lyric release" step above and docker/Dockerfile's
      # shim-builder stage, plus this file's pinned-ARG parsing below (#660).
      - name: Test Lyric version-resolution shell logic
        run: ./scripts/test-lyric-version-resolution.sh

      # Regression test for docker/split-ca-bundle.sh (#716): single-cert
      # passthrough, multi-cert bundle split, mixed cert+CRL bundle split
      # (#714), and non-PEM passthrough.
      - name: Test split-ca-bundle.sh
        run: ./scripts/test-split-ca-bundle.sh

      # Guards against the class of bug in nichobbs/cloud-agents#464: the two
      # deploy compose files use different relative-path conventions (one
      # assumes `cd deploy/` first, the other assumes Coolify's
      # --project-directory=repo-root invocation), and `docker compose
      # config` alone doesn't catch a path resolving to a directory that
      # doesn't exist — see the script for detail.
      - name: Validate deploy compose file path resolution
        run: ./scripts/check-compose-paths.sh

      # deploy/api.Dockerfile pins an explicit Lyric compiler version rather
      # than always fetching "latest" (nichobbs/cloud-agents#515 — a
      # since-fixed upstream compiler bug resurfaced in production because
      # that RUN step's Docker layer cache silently froze on an old
      # "latest"). Guards that pin from drifting below the documented
      # known-good floor without anyone noticing — same sort -V idiom as
      # "Verify minimum Lyric version" above, just checking the Dockerfile's
      # pin instead of the resolved release.
      - name: Verify api.Dockerfile's pinned Lyric version meets the floor
        run: |
          MIN_VERSION="$(cat MIN_LYRIC_VERSION)"
          PINNED="$(sed -n 's/^ARG LYRIC_VERSION=\(.*\)$/\1/p' deploy/api.Dockerfile)"
          if [ -z "$PINNED" ]; then
            echo "::error::could not find 'ARG LYRIC_VERSION=' in deploy/api.Dockerfile" >&2
            exit 1
          fi
          lowest="$(printf '%s\n%s\n' "$MIN_VERSION" "$PINNED" | sort -V | head -1)"
          if [ "$lowest" != "$MIN_VERSION" ]; then
            echo "::error::deploy/api.Dockerfile pins Lyric $PINNED, below MIN_LYRIC_VERSION ($MIN_VERSION) — bump ARG LYRIC_VERSION in deploy/api.Dockerfile." >&2
            exit 1
          fi
          echo "deploy/api.Dockerfile pins Lyric $PINNED >= required minimum $MIN_VERSION"

      # The floor check above only validates ordering — it doesn't confirm
      # the pinned release's tarball actually exists. Nothing else in this
      # job builds deploy/api.Dockerfile itself, so a typo'd or since-yanked
      # LYRIC_VERSION would otherwise pass CI green and only be discovered
      # at actual image-build/deploy time. Downloads it for real (the same
      # proven URL pattern the "Install Lyric compiler" step above already
      # uses successfully) rather than a HEAD-only check, since GitHub's
      # release-asset redirect target's HEAD support isn't something to
      # assume without being able to verify it directly.
      - name: Verify api.Dockerfile's pinned Lyric release actually exists
        run: |
          PINNED="$(sed -n 's/^ARG LYRIC_VERSION=\(.*\)$/\1/p' deploy/api.Dockerfile)"
          URL="https://github.com/nichobbs/lyric-lang/releases/download/v${PINNED}/lyric-${PINNED}-linux-x64.tar.gz"
          if ! curl -fsSL --connect-timeout 10 --max-time 120 --retry 3 --retry-delay 3 -o /tmp/pinned-lyric.tgz "$URL"; then
            echo "::error::deploy/api.Dockerfile pins Lyric $PINNED, but $URL failed to download (typo, or that release/asset doesn't exist)." >&2
            exit 1
          fi
          rm -f /tmp/pinned-lyric.tgz
          echo "Confirmed $URL resolves"

      # docker/Dockerfile's ARG LYRIC_VERSION defaults to "" (auto-resolves
      # the latest lyric-lang release at build time, matching install.sh's
      # own no-argument behavior) rather than a static pin, so builds never
      # go stale on an old cached "latest" and never need a manual bump —
      # see that file's comments for the full reasoning. --build-arg
      # LYRIC_VERSION=X.Y.Z still overrides this for a reproducible/pinned
      # build. Since there's no static version to floor/existence-check when
      # the default is empty, these two steps skip with a note in that case.
      # docker-build-ci.yml's real `docker build` smoke test covers this
      # file's syntax/COPY/build-graph correctness, but NOT continuous
      # coverage of the live resolve-latest path specifically: that job
      # persists its Docker layer cache across PRs (cache-from/to
      # type=gha), so the RUN layer that resolves "latest" is usually
      # served from cache rather than re-executed (#658) — it only
      # actually re-resolves on a cache-cold build (MIN_LYRIC_VERSION
      # changes, the shim changes, or the base image digest bumps).
      # test-lyric-version-resolution.sh above is what continuously
      # exercises the resolution/parsing logic itself, every run,
      # regardless of Docker caching. If a real pin IS present (an
      # override left in the file, or a future revert), still check it
      # the same way api.Dockerfile's pin is checked above.
      - name: Verify docker/Dockerfile's pinned Lyric version meets the floor (if pinned)
        run: |
          MIN_VERSION="$(cat MIN_LYRIC_VERSION)"
          RAW_PINS="$(sed -n 's/^ARG LYRIC_VERSION=\(.*\)$/\1/p' docker/Dockerfile | sort -u)"
          if [ -z "$RAW_PINS" ]; then
            echo "::error::could not find 'ARG LYRIC_VERSION=' in docker/Dockerfile" >&2
            exit 1
          fi
          for RAW in $RAW_PINS; do
            PINNED="$(echo "$RAW" | tr -d '"')"
            if [ -z "$PINNED" ]; then
              echo "docker/Dockerfile's ARG LYRIC_VERSION defaults to empty (auto-resolves latest at build time) — nothing to floor-check statically."
              continue
            fi
            lowest="$(printf '%s\n%s\n' "$MIN_VERSION" "$PINNED" | sort -V | head -1)"
            if [ "$lowest" != "$MIN_VERSION" ]; then
              echo "::error::docker/Dockerfile pins Lyric $PINNED, below MIN_LYRIC_VERSION ($MIN_VERSION) — bump ARG LYRIC_VERSION in docker/Dockerfile." >&2
              exit 1
            fi
            echo "docker/Dockerfile pins Lyric $PINNED >= required minimum $MIN_VERSION"
          done

      - name: Verify docker/Dockerfile's pinned Lyric release(s) actually exist (if pinned)
        run: |
          RAW_PINS="$(sed -n 's/^ARG LYRIC_VERSION=\(.*\)$/\1/p' docker/Dockerfile | sort -u)"
          for RAW in $RAW_PINS; do
            PINNED="$(echo "$RAW" | tr -d '"')"
            if [ -z "$PINNED" ]; then
              echo "docker/Dockerfile's ARG LYRIC_VERSION defaults to empty (auto-resolves latest at build time) — nothing to existence-check statically."
              continue
            fi
            URL="https://github.com/nichobbs/lyric-lang/releases/download/v${PINNED}/lyric-${PINNED}-linux-x64.tar.gz"
            if ! curl -fsSL --connect-timeout 10 --max-time 120 --retry 3 --retry-delay 3 -o /tmp/pinned-lyric-docker.tgz "$URL"; then
              echo "::error::docker/Dockerfile pins Lyric $PINNED, but $URL failed to download (typo, or that release/asset doesn't exist)." >&2
              exit 1
            fi
            rm -f /tmp/pinned-lyric-docker.tgz
            echo "Confirmed $URL resolves"
          done

      # Build the entire server. Lyric.Web/Lyric.Docker/Std.Logging/
      # Microsoft.Data.Sqlite all restore from NuGet — see docs/BUILD.md.
      # No sibling lyric-lang checkout.
      - name: Build full server
        run: ./scripts/build-full.sh

      # Runtime-verify the Docker/Web-independent logic (SSE framing, Phase
      # 2/3 state machine, recycling, auth) via a hand-rolled `main()`
      # harness rather than `lyric test` — kept as its own, dependency-free
      # check even now that `lyric test` (below) is fully green; see
      # docs/BUILD.md "Running tests"/"Compiler notes" for why this harness
      # existed in the first place.
      - name: Run tests
        run: ./scripts/verify.sh

      # The real @test_module suites. All seven known upstream compiler bugs
      # (see docs/BUILD.md "Compiler notes") are now fixed as of v0.4.19, so
      # this is expected to pass — the first time in this project's history
      # that `lyric test` has been a viable CI gate.
      #
      # LD_LIBRARY_PATH: the live-database suites (prompt/session tests) open
      # real SQLite connections, and Microsoft.Data.Sqlite's type initializer
      # needs the native libe_sqlite3.so, which the test runner does not
      # resolve from the NuGet cache on its own. build-full.sh (above) already
      # copied the native runtimes to bin/runtimes — expose them to dlopen.
      - name: Run lyric test
        run: |
          if [ -d "$PWD/bin/runtimes/linux-x64/native" ]; then
            export LD_LIBRARY_PATH="$PWD/bin/runtimes/linux-x64/native:${LD_LIBRARY_PATH:-}"
          fi
          lyric test

      # cloud-agents-shim (docs/phase6-mcp-callbacks.md §5, stage 3): the
      # in-container MCP callback server, built and tested as its own
      # project via --manifest, same as the root project above. Restores
      # Lyric.Mcp (and its transitive Lyric.JsonRpc dependency) from NuGet.
      - name: Build cloud-agents-shim
        run: |
          lyric restore --manifest shim/lyric.toml
          lyric build --manifest shim/lyric.toml

      - name: Run cloud-agents-shim tests
        run: lyric test --manifest shim/lyric.toml

      # #621/#638: the shim's 13-tool MCP registration set is hand-kept in
      # THREE independent places with no dependency edge between the two
      # separate Lyric projects to share it through code:
      #   - shim/src/main.l's toolIsEnabled(enabledToolsCsv, "<name>") gates,
      #     one per addTool call — the actual registration set
      #   - shim/tests/config_tests.l's allShimToolNames — proves the shim's
      #     own set internally
      #   - src/handlers/profiles.l's validShimToolNames — the root
      #     project's copy, used to validate a profile's tool grants
      # A comment-only cross-reference isn't enforced by anything; this
      # step is the automated safeguard #621 asked for and #638 requested,
      # replacing "trust the comments" with an actual CI failure if any one
      # of the three drifts from the other two.
      - name: Verify the shim's 13-tool list is in sync across all three copies
        run: |
          python3 - <<'PYEOF'
          import re
          import sys

          # re.DOTALL (#640): a future `lyric fmt --write` could rewrap one of
          # these array literals or call sites onto multiple lines (the same
          # wrapping this PR's own #622 fix applied elsewhere) - without
          # DOTALL, '.' doesn't match a newline, so a wrapped literal would
          # silently fail to match and produce a confusing "could not find"
          # error instead of an actual drift report. \s* between tokens
          # tolerates the whitespace/indentation reformatting adds too.
          def extract_array(path, var_name):
              text = open(path).read()
              pattern = r'val\s+' + re.escape(var_name) + r'\s*:\s*slice\[String\]\s*=\s*\[(.*?)\]'
              m = re.search(pattern, text, re.DOTALL)
              if not m:
                  print(f"::error::could not find '{var_name}' in {path}", file=sys.stderr)
                  sys.exit(1)
              return sorted(set(re.findall(r'"([^"]+)"', m.group(1))))

          def extract_main_tools(path):
              text = open(path).read()
              pattern = r'toolIsEnabled\s*\(\s*enabledToolsCsv\s*,\s*"([^"]+)"\s*\)'
              names = sorted(set(re.findall(pattern, text, re.DOTALL)))
              if not names:
                  print(f"::error::found no toolIsEnabled(...) tool names in {path}", file=sys.stderr)
                  sys.exit(1)
              return names

          profiles = extract_array('src/handlers/profiles.l', 'validShimToolNames')
          config_tests = extract_array('shim/tests/config_tests.l', 'allShimToolNames')
          main_tools = extract_main_tools('shim/src/main.l')

          copies = {
              'src/handlers/profiles.l validShimToolNames': set(profiles),
              'shim/tests/config_tests.l allShimToolNames': set(config_tests),
              'shim/src/main.l toolIsEnabled gates': set(main_tools),
          }
          union = set().union(*copies.values())
          mismatched = False
          for label, names in copies.items():
              missing = union - names
              if missing:
                  mismatched = True
                  print(f"::error::{label} is missing: {sorted(missing)}", file=sys.stderr)
          if mismatched:
              sys.exit(1)
          print(f"All three tool-name copies match: {sorted(union)} ({len(union)} tools)")
          PYEOF

      # Real end-to-end HTTP check against the built server (nichobbs/cloud-agents#442):
      # starts bin/CloudAgents.dll on a throwaway DB/port and curls a multi-param
      # route (/api/sessions/{id}/output/{offset}) plus the proxy routes — the
      # dispatch paths @test_module suites can't reach because Web.Request can't
      # be constructed in a test (#354). No Docker needed. This is the automated
      # proof that multi-param routing works; the script dumps the server log and
      # fails the job on any assertion miss. Runs AFTER the shim build: the
      # script also drives the real cloud-agents-shim binary over MCP stdio
      # against the running server (#531), so shim/bin must exist.
      - name: E2E HTTP smoke test
        run: ./scripts/e2e-http.sh

