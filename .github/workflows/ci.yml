name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # The installer's "resolve latest release" step calls api.github.com,
      # which is occasionally rate-limited/blocked for unauthenticated
      # runners (see docs/BUILD.md). Fall back to resolving the release tag
      # from the unauthenticated github.com redirect and downloading the
      # release asset directly, same as the documented manual workaround.
      - name: Install Lyric compiler
        run: |
          mkdir -p "$HOME/.local/bin"
          if ! curl -fsSL https://raw.githubusercontent.com/nichobbs/lyric-lang/main/scripts/install.sh \
              | sh -s -- --dir "$HOME/.local/bin" --no-path; then
            echo "primary installer failed — falling back to direct release download"
            ver=$(curl -sI https://github.com/nichobbs/lyric-lang/releases/latest \
                    | sed -n 's/.*tag\/v\([0-9.]*\).*/\1/p' | tr -d '\r')
            [ -n "$ver" ] || { echo "could not resolve latest Lyric release tag" >&2; exit 1; }
            curl -fsSL -o /tmp/lyric.tgz \
              "https://github.com/nichobbs/lyric-lang/releases/download/v${ver}/lyric-${ver}-linux-x64.tar.gz"
            tar -xzf /tmp/lyric.tgz -C "$HOME/.local/bin"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lyric version
        run: lyric --version

      # Shell + asset sanity checks (no Lyric toolchain needed).
      - name: Lint shell scripts
        run: |
          for f in \
            docker/entrypoint.sh \
            docker/entrypoint-codex.sh \
            docker/entrypoint-opencode.sh \
            deploy/install-docker.sh \
            deploy/backup.sh \
            scripts/verify.sh \
            scripts/build-full.sh \
            scripts/dev.sh \
            scripts/build-docker.sh \
            scripts/run-api.sh \
            scripts/repro-compiler-bug.sh; do
            bash -n "$f" && echo "ok: $f"
          done

      - name: Validate JSON templates
        run: |
          for f in docker/mcp.json.template docker/settings.json.template; do
            python3 -m json.tool "$f" > /dev/null && echo "ok: $f"
          done

      # Build the entire server. Lyric.Web/Std.Logging/Microsoft.Data.Sqlite
      # restore from NuGet; Lyric.Docker compiles from vendor/lyric-docker as
      # an ordinary local package (the published NuGet Lyric.Docker package
      # doesn't expose the container-lifecycle API this project needs — see
      # docs/BUILD.md). No sibling lyric-lang checkout either way.
      - name: Build full server
        run: ./scripts/build-full.sh

      # Runtime-verify the Docker/Web-independent logic (SSE framing, Phase
      # 2/3 state machine, recycling, auth). Not `lyric test` — that crashes
      # on this project's manifest under the current compiler, see
      # docs/BUILD.md "Running tests". This harness has no external
      # dependencies, so it doesn't need its own restore.
      - name: Run tests
        run: ./scripts/verify.sh
