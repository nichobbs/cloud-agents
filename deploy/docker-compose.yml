# Phase 5 deployment topology for a single VM.
#
# The api service talks to the host Docker daemon (via the mounted socket) to
# launch ephemeral runner containers, so it must run with access to
# /var/run/docker.sock. Caddy terminates TLS and reverse-proxies to the api and
# frontend (see deploy/Caddyfile).

services:
  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      - CLOUD_AGENTS_WHITELIST=${CLOUD_AGENTS_WHITELIST:-}
      # GitHub OAuth app credentials (optional). Unset -> oauthConfigured()
      # is false, the frontend never shows "Sign in with GitHub" or
      # enforces the login guard, and the app is open access — same as
      # today if you don't set these.
      - CLOUD_AGENTS_GITHUB_CLIENT_ID=${CLOUD_AGENTS_GITHUB_CLIENT_ID:-}
      - CLOUD_AGENTS_GITHUB_CLIENT_SECRET=${CLOUD_AGENTS_GITHUB_CLIENT_SECRET:-}
      # Idiomatic Lyric alternative to the two vars above (D046,
      # docs/25-config-blocks.md): set
      # LYRIC_CONFIG_CLOUDAGENTS_OAUTH_GITHUB_CLIENT_ID /
      # LYRIC_CONFIG_CLOUDAGENTS_OAUTH_GITHUB_CLIENT_SECRET /
      # LYRIC_CONFIG_CLOUDAGENTS_OAUTH_GITHUB_WHITELIST directly in .env
      # instead — they take priority over the CLOUD_AGENTS_* names above
      # when set, and are entirely optional (oauth.l's config Github{} block
      # falls back to the plain names when unset). CAUTION: if you set the
      # CLIENT_ID/CLIENT_SECRET config-block overrides, also set the
      # WHITELIST one (or keep CLOUD_AGENTS_WHITELIST set) — an empty
      # whitelist on either path means open access to any authenticated
      # GitHub user, not "no one".
      # Network policy for the 'restricted' profile: the Docker network runner
      # containers join, and an optional egress proxy. Unset -> 'restricted'
      # fails closed to no network (#306). The API reads these to set each
      # runner container's NetworkMode; they must be forwarded here or the
      # 'restricted' join-network branch is unreachable.
      - CLOUD_AGENTS_RESTRICTED_NETWORK=${CLOUD_AGENTS_RESTRICTED_NETWORK:-}
      - CLOUD_AGENTS_EGRESS_PROXY=${CLOUD_AGENTS_EGRESS_PROXY:-}
      # CLOUD_AGENTS_ENABLED_HARNESSES (GET /api/harnesses, #523) is
      # deliberately left unset here: install-docker.sh builds all four
      # runner images unconditionally on this standalone-VM path, so there's
      # nothing to restrict — unset means "every harness enabled" (fail
      # open). docker-compose.coolify.yml now leaves it unset too, for the
      # same reason (all four runner images there build unconditionally as
      # well).
      - LYRIC_CONFIG_WEB_SERVER_PORT=8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - user_data:/user-home
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  user_data:
  caddy_data:
  caddy_config:
